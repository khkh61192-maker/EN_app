<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Pro - 效率學習版</title>
    <!-- 
      DEVELOPER NOTES (v1.3.1):
      1. 語速控制：改為固定四檔位按鈕。
      2. 顯示控制：新增 Example 顯示開關。
      3. 欄位一致性：保持 v1.3.0 的 Core, Syn, Misc, Example 結構。
    -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preserve-format { white-space: pre-wrap; word-break: break-word; }
        .active-word { background-color: #f0f9ff; border-left: 6px solid #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
        .word-card { transition: all 0.2s ease-out; }
        html { scroll-behavior: smooth; }
        #historyModal { display: none; }
        .section-label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-top: 4px; display: block; }
        
        /* 語速按鈕樣式 */
        .speed-btn { @apply px-3 py-1 text-xs font-bold rounded-lg border border-slate-200 bg-white text-slate-500 transition-all; }
        .speed-btn.active { @apply bg-blue-600 text-white border-blue-600 shadow-md scale-105; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans text-slate-800">

<div class="max-w-2xl mx-auto p-4">
    <!-- 頂部控制面板 -->
    <header class="sticky top-0 bg-white/95 backdrop-blur shadow-md p-4 rounded-b-2xl z-30 mb-2 border-b border-slate-200">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h1 class="text-xl font-black text-blue-600 flex items-center gap-2">
                    Vocab Pro 
                    <span id="versionTag" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full cursor-pointer">v1.3.1</span>
                </h1>
                <p id="totalCount" class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase italic">連線中...</p>
            </div>
            <div class="flex flex-wrap justify-end gap-2 max-w-[240px]">
                <button id="exportBtn" class="text-[10px] bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-full border border-emerald-100 font-bold">備份</button>
                <label class="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded-full font-bold cursor-pointer shadow-md">
                    匯入 Excel
                    <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden"/>
                </label>
                <button id="toggleAddForm" class="text-[10px] bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full border border-slate-200 font-bold">+ 新增</button>
            </div>
        </div>

        <!-- 搜尋與過濾 -->
        <div class="space-y-2 mb-4">
            <input type="text" id="searchInput" placeholder="搜尋關鍵字..." class="w-full p-2.5 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
            <div class="flex gap-2">
                <select id="groupFilter" class="flex-1 bg-slate-800 text-white text-xs font-bold rounded-xl p-2.5 outline-none border-none">
                    <option value="ALL">全部單字</option>
                </select>
                <select id="voiceSelect" class="flex-1 bg-white text-slate-600 text-xs font-bold rounded-xl p-2.5 outline-none border border-slate-200">
                    <option value="">載入語音中...</option>
                </select>
            </div>
        </div>

        <!-- 新增/編輯表單 -->
        <div id="addForm" class="hidden bg-blue-50 p-4 rounded-xl mb-4 border border-blue-200 shadow-inner">
            <h3 id="formTitle" class="text-xs font-black mb-3 text-blue-600 uppercase">單字編輯器</h3>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input type="text" id="newWord" placeholder="單字*" class="p-2 border rounded-lg text-sm outline-blue-400">
                <input type="text" id="newGroup" placeholder="群組" class="p-2 border rounded-lg text-sm outline-blue-400">
            </div>
            <input type="text" id="newPos" placeholder="詞性" class="w-full p-2 border rounded-lg mb-2 text-sm outline-blue-400">
            <textarea id="newCore" placeholder="Core: 核心意思" class="w-full p-2 border rounded-lg mb-2 text-sm outline-blue-400" rows="1"></textarea>
            <textarea id="newSyn" placeholder="Syn: 同義詞/片語" class="w-full p-2 border rounded-lg mb-2 text-sm outline-blue-400" rows="1"></textarea>
            <textarea id="newMisc" placeholder="Misc: 其他補充" class="w-full p-2 border rounded-lg mb-2 text-sm outline-blue-400" rows="1"></textarea>
            <textarea id="newEx" placeholder="Example: 例句" class="w-full p-2 border rounded-lg mb-2 text-sm outline-blue-400" rows="2"></textarea>
            <div class="flex gap-2 mt-2">
                <button id="saveWordBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex-1 font-bold">儲存</button>
                <button id="closeFormBtn" class="bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-bold">取消</button>
            </div>
        </div>
        
        <!-- 播放控制與顯示設定 -->
        <div class="space-y-3">
            <!-- 內容顯示開關 -->
            <div class="flex flex-wrap gap-x-4 gap-y-2 justify-between px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">
                <div class="flex gap-3">
                    <label class="flex items-center gap-1 cursor-pointer text-[10px] font-black text-slate-500 uppercase"><input type="checkbox" id="showCore" checked> 核心</label>
                    <label class="flex items-center gap-1 cursor-pointer text-[10px] font-black text-slate-500 uppercase"><input type="checkbox" id="showSyn" checked> 同義</label>
                    <label class="flex items-center gap-1 cursor-pointer text-[10px] font-black text-slate-500 uppercase"><input type="checkbox" id="showMisc" checked> 其他</label>
                    <label class="flex items-center gap-1 cursor-pointer text-[10px] font-black text-slate-500 uppercase border-l pl-3"><input type="checkbox" id="showEx" checked> 例句</label>
                </div>
                <!-- 語速選擇 -->
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black text-slate-400 uppercase">語速</span>
                    <div class="flex gap-1" id="speedContainer">
                        <button class="speed-btn" data-speed="0.8">0.8</button>
                        <button class="speed-btn" data-speed="0.9">0.9</button>
                        <button class="speed-btn active" data-speed="1.0">1.0</button>
                        <button class="speed-btn" data-speed="1.2">1.2</button>
                    </div>
                </div>
            </div>

            <div class="flex gap-2">
                <button id="playBtn" class="flex-[3] bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all">開始循環播放</button>
                <button id="stopBtn" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-xl font-black active:scale-95">停止</button>
                <button id="clearBtn" class="bg-red-50 text-red-400 px-3 rounded-xl text-[10px] font-bold border border-red-50">清空</button>
            </div>
            
            <div class="flex gap-4 px-2">
                <label class="flex items-center gap-1.5 cursor-pointer text-[10px] font-black text-slate-400 uppercase"><input type="checkbox" id="sayExample" checked> 朗讀例句</label>
                <label class="flex items-center gap-1.5 cursor-pointer text-[10px] font-black text-slate-400 uppercase"><input type="checkbox" id="autoScroll" checked> 自動捲動</label>
            </div>
        </div>
    </header>

    <!-- 單字列表 -->
    <div id="wordList" class="space-y-3 mt-4"></div>
</div>

<!-- 改版歷史 Modal -->
<div id="historyModal" class="fixed inset-0 bg-black/60 z-[50] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl">
        <h2 class="text-xl font-black text-slate-800 mb-4 border-b pb-2">改版歷史紀錄</h2>
        <div class="space-y-4 max-h-[60vh] overflow-y-auto text-sm leading-relaxed pr-2">
            <div>
                <span class="font-bold text-blue-600">v1.3.1 (當前版本)</span>
                <p class="text-slate-600">・新增例句顯示切換開關。<br>・語速改為 0.8 / 0.9 / 1.0 / 1.2 四檔按鈕切換。<br>・優化控制面板介面與選取狀態顯示。</p>
            </div>
            <div>
                <span class="font-bold text-slate-700">v1.3.0</span>
                <p class="text-slate-500">・定義拆分為 Core, Syn, Misc。</p>
            </div>
        </div>
        <button id="closeHistory" class="mt-6 w-full bg-slate-800 text-white py-3 rounded-xl font-bold">關閉</button>
    </div>
</div>

<script>
    /* -------------------------------------------------------------------------
       1. 初始化與資料庫
    ------------------------------------------------------------------------- */
    const db = new Dexie("VocabProDB_V13");
    db.version(1).stores({ 
        words: "++id, &Word, Group, Pos, Core, Syn, Misc, Example" 
    });

    let allWords = [];
    let filteredWords = [];
    let currentIndex = -1;
    let isPlaying = false;
    let playTimeout = null;
    let editingId = null;
    let currentSpeed = 1.0;
    const synth = window.speechSynthesis;
    let voices = [];

    window.onload = async () => {
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

        // 載入顯示偏好
        ['showCore', 'showSyn', 'showMisc', 'showEx'].forEach(id => {
            const val = localStorage.getItem(id);
            if (val !== null) document.getElementById(id).checked = (val === 'true');
        });

        // 載入語速
        const savedSpeed = localStorage.getItem('pro_speed') || '1.0';
        setSpeed(savedSpeed);
        
        await loadData();
    };

    function loadVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        const select = document.getElementById('voiceSelect');
        if (voices.length === 0) return;
        select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        const savedVoice = localStorage.getItem('pro_voiceIndex');
        if (savedVoice && voices[savedVoice]) select.value = savedVoice;
    }

    function setSpeed(speed) {
        currentSpeed = parseFloat(speed);
        localStorage.setItem('pro_speed', speed);
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.speed === speed);
        });
    }

    /* -------------------------------------------------------------------------
       2. 資料處理邏輯
    ------------------------------------------------------------------------- */
    async function loadData() {
        allWords = await db.words.toArray();
        const groups = [...new Set(allWords.map(w => w.Group || '未分類'))];
        const groupFilter = document.getElementById('groupFilter');
        const lastGroup = localStorage.getItem('pro_lastGroup') || 'ALL';
        
        groupFilter.innerHTML = `<option value="ALL">全部單字 (${allWords.length})</option>` + 
            groups.map(g => `<option value="${g}">${g}</option>`).join('');
        
        if ([...groupFilter.options].some(opt => opt.value === lastGroup)) groupFilter.value = lastGroup;
        filterWords();
    }

    function filterWords() {
        const selectedGroup = document.getElementById('groupFilter').value;
        const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
        localStorage.setItem('pro_lastGroup', selectedGroup);
        
        filteredWords = allWords.filter(w => {
            const matchGroup = (selectedGroup === 'ALL') || ((w.Group || '未分類') === selectedGroup);
            const matchSearch = !searchKeyword || 
                                w.Word.toLowerCase().includes(searchKeyword) || 
                                (w.Core && w.Core.toLowerCase().includes(searchKeyword));
            return matchGroup && matchSearch;
        });
        document.getElementById('totalCount').innerText = `${filteredWords.length} WORDS`;
        renderList();
    }

    function renderList() {
        const wordListEl = document.getElementById('wordList');
        if (filteredWords.length === 0) {
            wordListEl.innerHTML = `<div class="text-center py-20 text-slate-300 italic text-sm">無內容，請匯入 Excel</div>`;
            return;
        }

        const showC = document.getElementById('showCore').checked;
        const showS = document.getElementById('showSyn').checked;
        const showM = document.getElementById('showMisc').checked;
        const showE = document.getElementById('showEx').checked;

        wordListEl.innerHTML = filteredWords.map((item, index) => `
            <div id="word-${index}" class="word-card p-4 bg-white rounded-2xl shadow-sm border border-slate-100 flex gap-3 relative" onclick="preview(${index})">
                <div class="text-blue-200 font-black text-[10px] pt-1">#${index + 1}</div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-lg font-bold text-slate-800">${item.Word}</span>
                        <div class="flex gap-2 items-center">
                            <span class="text-[9px] font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded uppercase">${item.Pos || ''}</span>
                            <button onclick="event.stopPropagation(); editWord(${item.id})" class="text-slate-300 hover:text-blue-500 p-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                            <button onclick="event.stopPropagation(); deleteWord(${item.id})" class="text-slate-300 hover:text-red-400 p-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                        </div>
                    </div>
                    ${showC && item.Core ? `<div class="mt-1"><span class="section-label">Core</span><div class="text-slate-700 text-sm leading-relaxed preserve-format font-medium">${item.Core}</div></div>` : ''}
                    ${showS && item.Syn ? `<div class="mt-1"><span class="section-label">Synonyms</span><div class="text-slate-500 text-xs leading-relaxed preserve-format">${item.Syn}</div></div>` : ''}
                    ${showM && item.Misc ? `<div class="mt-1"><span class="section-label">Misc</span><div class="text-slate-400 text-[11px] leading-relaxed preserve-format italic">${item.Misc}</div></div>` : ''}
                    ${showE && item.Example ? `<div class="mt-3 p-2.5 bg-slate-50 rounded-lg text-slate-500 text-xs italic preserve-format border-l-2 border-slate-200">${item.Example}</div>` : ''}
                </div>
            </div>
        `).join('');
    }

    /* -------------------------------------------------------------------------
       3. 播放控制
    ------------------------------------------------------------------------- */
    function speak(text, callback) {
        if (!isPlaying && !window.single) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        const voiceIndex = document.getElementById('voiceSelect').value;
        if (voices[voiceIndex]) utter.voice = voices[voiceIndex];
        utter.rate = currentSpeed;
        utter.lang = 'en-US';
        utter.onend = callback;
        synth.speak(utter);
    }

    function playLoop() {
        if (!isPlaying) return;
        if (playTimeout) clearTimeout(playTimeout);
        if (currentIndex >= filteredWords.length - 1) currentIndex = -1;
        currentIndex++;
        
        document.querySelectorAll('.active-word').forEach(el => el.classList.remove('active-word'));
        const currentEl = document.getElementById(`word-${currentIndex}`);
        if (currentEl) {
            currentEl.classList.add('active-word');
            if (document.getElementById('autoScroll').checked) currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        const wordObj = filteredWords[currentIndex];
        speak(wordObj.Word, () => {
            if (!isPlaying) return;
            if (document.getElementById('sayExample').checked && wordObj.Example) {
                playTimeout = setTimeout(() => {
                    speak(wordObj.Example, () => { playTimeout = setTimeout(playLoop, 2000); });
                }, 800);
            } else {
                playTimeout = setTimeout(playLoop, 1500);
            }
        });
    }

    /* -------------------------------------------------------------------------
       4. 事件監聽與交互
    ------------------------------------------------------------------------- */
    document.getElementById('speedContainer').addEventListener('click', (e) => {
        if (e.target.classList.contains('speed-btn')) setSpeed(e.target.dataset.speed);
    });

    ['showCore', 'showSyn', 'showMisc', 'showEx'].forEach(id => {
        document.getElementById(id).addEventListener('change', (e) => {
            localStorage.setItem(id, e.target.checked);
            renderList();
        });
    });

    document.getElementById('searchInput').addEventListener('input', filterWords);
    document.getElementById('groupFilter').addEventListener('change', () => { isPlaying = false; synth.cancel(); filterWords(); });

    document.getElementById('excelInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        let count = 0;
        for (const item of jsonData) {
            try {
                const Word = String(item.Word || '').trim();
                if (!Word) continue;
                await db.words.put({
                    Word: Word, Group: String(item.Group || '未分類').trim(), Pos: String(item.Pos || '').trim(),
                    Core: String(item.Core || '').trim(), Syn: String(item.Syn || '').trim(),
                    Misc: String(item.Misc || '').trim(), Example: String(item.Example || '').trim()
                });
                count++;
            } catch (e) { console.error(e); }
        }
        await loadData();
        alert(`匯入 ${count} 筆`);
        e.target.value = "";
    });

    document.getElementById('saveWordBtn').addEventListener('click', async () => {
        const Word = document.getElementById('newWord').value.trim();
        if (!Word) return;
        const data = {
            Word, Group: document.getElementById('newGroup').value.trim() || '未分類', Pos: document.getElementById('newPos').value.trim(),
            Core: document.getElementById('newCore').value.trim(), Syn: document.getElementById('newSyn').value.trim(),
            Misc: document.getElementById('newMisc').value.trim(), Example: document.getElementById('newEx').value.trim()
        };
        if (editingId) await db.words.update(editingId, data);
        else await db.words.put(data);
        document.getElementById('addForm').classList.add('hidden');
        await loadData();
    });

    window.editWord = async (id) => {
        const word = await db.words.get(id);
        editingId = id;
        document.getElementById('formTitle').innerText = `編輯：${word.Word}`;
        document.getElementById('newWord').value = word.Word;
        document.getElementById('newGroup').value = word.Group;
        document.getElementById('newPos').value = word.Pos;
        document.getElementById('newCore').value = word.Core || '';
        document.getElementById('newSyn').value = word.Syn || '';
        document.getElementById('newMisc').value = word.Misc || '';
        document.getElementById('newEx').value = word.Example;
        document.getElementById('addForm').classList.remove('hidden');
        window.scrollTo(0, 0);
    };

    window.deleteWord = async (id) => { if(confirm('刪除？')) { await db.words.delete(id); loadData(); } };
    document.getElementById('playBtn').addEventListener('click', () => { if (filteredWords.length === 0) return; isPlaying = true; document.getElementById('playBtn').innerText = "🔊 朗讀中..."; playLoop(); });
    document.getElementById('stopBtn').addEventListener('click', () => { isPlaying = false; if (playTimeout) clearTimeout(playTimeout); synth.cancel(); document.getElementById('playBtn').innerText = "開始循環播放"; });
    document.getElementById('exportBtn').addEventListener('click', async () => {
        const all = await db.words.toArray();
        const ws = XLSX.utils.json_to_sheet(all.map(w => ({Word:w.Word, Group:w.Group, Pos:w.Pos, Core:w.Core, Syn:w.Syn, Misc:w.Misc, Example:w.Example})));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Backup");
        XLSX.writeFile(wb, `Vocab_Backup_V131.xlsx`);
    });
    document.getElementById('clearBtn').addEventListener('click', async () => { if(confirm('清空？')){ await db.words.clear(); loadData(); } });
    document.getElementById('versionTag').addEventListener('click', () => document.getElementById('historyModal').style.display = 'flex');
    document.getElementById('closeHistory').addEventListener('click', () => document.getElementById('historyModal').style.display = 'none');
    document.getElementById('toggleAddForm').addEventListener('click', () => { editingId = null; document.getElementById('addForm').classList.toggle('hidden'); });
    document.getElementById('closeFormBtn').addEventListener('click', () => document.getElementById('addForm').classList.add('hidden'));
    window.preview = (index) => { window.single = true; speak(filteredWords[index].Word, () => window.single = false); };
</script>
</body>
</html>
